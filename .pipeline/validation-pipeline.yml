# PR validation pipeline for internal ADO and GitHub pull requests.
# Purely a PR pipeline; CI on merge to development is handled by validation-pipeline-ci.yml.
trigger: none

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: RunFuzz
  displayName: Run Fuzz Tests (30 min)
  type: boolean
  default: false

- name: RunLongHaul
  displayName: Run Long-Haul BCP Test (30 min)
  type: boolean
  default: false

stages:
- template: validation-stages.yml
  parameters:
    buildType: ${{ parameters.buildType }}
    RunFuzz: ${{ parameters.RunFuzz }}
    RunLongHaul: ${{ parameters.RunLongHaul }}
    # PR validation for internal ADO and GitHub PRs. GitHub PRs run in the public
    # project, which lacks 'Magnitude Test', so exclude the infra stages here.
    includeInfraStages: false