# GitHub main CI pipeline. Runs the validation suite in CI mode when
# microsoft/mssql-rs main is updated. PR validation is handled by validation-pipeline.yml.
# Runs with internal resource access ('Magnitude Test' available), so the infra
# stages (Long-Haul, Private Link Smoke) are included.
trigger:
- main
pr: none

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: RunFuzz
  displayName: Run Fuzz Tests (30 min)
  type: boolean
  default: false

- name: RunLongHaul
  displayName: Run Long-Haul BCP Test (30 min)
  type: boolean
  default: false

- name: sqlInstanceMode
  displayName: SQL host cardinality for ARM test stages
  type: string
  values:
  - shared
  - per-job
  default: shared

- name: sqlImageTag
  displayName: SQL Server docker image tag for ARM test stages
  type: string
  default: '2025-latest'

stages:
- template: templates/validation-stages.yml
  parameters:
    buildType: ${{ parameters.buildType }}
    RunFuzz: ${{ parameters.RunFuzz }}
    RunLongHaul: ${{ parameters.RunLongHaul }}
    sqlInstanceMode: ${{ parameters.sqlInstanceMode }}
    sqlImageTag: ${{ parameters.sqlImageTag }}
    # Runs with internal resource access, so keep the infra stages.
    includeInfraStages: true