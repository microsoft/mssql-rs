# Fixed-baseline performance pipeline (dedicated perf lab)
#
# Compares the current commit against a fixed, manually-advanced baseline
# pinned by the `perf-baseline` git tag, using the mssql-tds-bench harness whose
# ONLY swapped input is the mssql-tds dependency. The harness code, Criterion
# version, and toolchain are identical across both runs, so any significant
# delta is attributable to mssql-tds itself.
#
# This pipeline consumes the shared PerfTest lab template, which runs the
# benchmarks on a dedicated host VM (not on shared/noisy build agents):
#   select region -> generate SSH key -> deploy VM -> copy repo -> run the
#   testScript on the VM -> collect results -> tear down.
#
# The build happens ON the VM (the lab's documented model): the testScript
# bootstraps the toolchain, builds the candidate from the working tree and the
# baseline from a local `git worktree` of the perf-baseline tag, then compares
# with critcmp. See mssql-tds-bench/perf-lab/run-benchmarks.{sh,ps1}.
#
# Complements benchmark-pipeline.yml (PR vs target branch). Trigger manually or
# on the weekly schedule below.

trigger: none
pr: none

schedules:
  - cron: '0 8 * * 1'
    displayName: Weekly baseline comparison
    branches:
      include:
        - main
    always: true

parameters:
  - name: platform
    displayName: 'Target platform'
    type: string
    default: linux
    values:
      - linux
      - windows

resources:
  repositories:
    - repository: PerfTemplates
      type: git
      name: InternalDriverTools/PerfTest
      ref: refs/heads/main

extends:
  template: v1/Perf.Test.Job.yml@PerfTemplates
  parameters:
    platform: ${{ parameters.platform }}
    # Ship the whole repo (including .git) so the testScript can create a local
    # worktree of the perf-baseline tag with no VM-side ADO authentication.
    testRootDir: $(Build.SourcesDirectory)/mssql-rs
    # Relative to testRootDir. The template auto-swaps .sh -> .ps1 on Windows.
    testScript: mssql-tds-bench/perf-lab/run-benchmarks.sh
    testScriptArgs: none
    testResultsSubDir: results
    testTimeoutMinutes: 120
    steps:
      - bash: |
          set -euo pipefail
          report="$(Build.ArtifactStagingDirectory)/results/comparison.txt"
          echo "=== Benchmark comparison (base -> candidate) ==="
          if [ -f "$report" ]; then
            cat "$report"
          else
            echo "comparison.txt not found"
          fi
        displayName: 'Show benchmark comparison'
