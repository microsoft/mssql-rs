# Pipeline to create a PR from development to main and stable after a PR merges into development.
# Can also be triggered manually. For each target branch, skips PR creation if:
# - A PR from development to that target already exists
# - There are no changes between development and that target

trigger: none

pr: none

parameters:
- name: targetBranches
  displayName: Target branches to sync development into
  type: object
  default:
  - main
  - stable

resources:
  repositories:
  - repository: self
    type: git
    ref: development

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  fetchDepth: 0
  persistCredentials: true

- script: |
    set -euo pipefail

    git fetch origin development $TARGETS

    for TARGET in $TARGETS; do
      echo "----- Processing development -> $TARGET -----"

      if git diff --quiet "origin/$TARGET..origin/development"; then
        echo "No changes between development and $TARGET. Skipping."
        continue
      fi
      echo "Changes detected between development and $TARGET."

      PR_EXISTS=$(az repos pr list \
        --organization "$(System.TeamFoundationCollectionUri)" \
        --project "$(System.TeamProject)" \
        --repository "$(Build.Repository.Name)" \
        --source-branch development \
        --target-branch "$TARGET" \
        --status active \
        --query "[0].pullRequestId" \
        --output tsv)

      if [ -n "$PR_EXISTS" ]; then
        echo "Active PR #$PR_EXISTS for development -> $TARGET already exists. Skipping."
        continue
      fi

      echo "No active PR found. Creating PR development -> $TARGET."
      az repos pr create \
        --organization "$(System.TeamFoundationCollectionUri)" \
        --project "$(System.TeamProject)" \
        --repository "$(Build.Repository.Name)" \
        --source-branch development \
        --target-branch "$TARGET" \
        --title "Sync development to $TARGET" \
        --description $'Sync of development to '"$TARGET"$' branch.\n\nBefore merging this PR, ensure that the CI has had a good run on the development branch.'
    done
  displayName: Sync development to target branches
  env:
    TARGETS: ${{ join(' ', parameters.targetBranches) }}
    AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
