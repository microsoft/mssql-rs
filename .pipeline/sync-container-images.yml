# Pipeline to sync base images, build custom CI images, and mirror them to GHCR.
# Three independent, skippable stages:
#   1. Import  - sync vanilla base images from public registries to ACR.
#                Runs only when Docker Hub credentials are provided.
#   2. Build   - build custom images (Rust/maturin pre-installed) on top of the
#                base images already in ACR, and push them to ACR.
#   3. Mirror  - mirror the current ACR images to GHCR. Runs only when the
#                GHCR_TOKEN secret variable is set; if stages 1 & 2 are skipped,
#                it just mirrors whatever is currently in ACR.
# Weekly schedule runs Monday at 3:00 AM UTC.

trigger: none

parameters:
# STAGE 1 (Import) is gated on Docker Hub credentials (dockerHubUsername +
# dockerHubPat) below: the import stage runs ONLY when both are provided, and
# is skipped entirely when either is empty. The per-image toggles here let you
# skip individual image groups within the import stage.
- name: syncManylinux
  displayName: 'Import: PyPA manylinux (quay.io)'
  type: boolean
  default: true

- name: syncMusllinux
  displayName: 'Import: PyPA musllinux (quay.io)'
  type: boolean
  default: true

- name: syncUbuntu
  displayName: 'Import: Ubuntu (docker.io)'
  type: boolean
  default: true

- name: syncAlpine1
  displayName: 'Import: Alpine 3.18-3.19 (docker.io)'
  type: boolean
  default: true

- name: syncAlpine2
  displayName: 'Import: Alpine 3.20-3.21 (docker.io)'
  type: boolean
  default: true

- name: syncDebianRHEL
  displayName: 'Import: Debian & RHEL (docker.io)'
  type: boolean
  default: true

- name: syncOracle
  displayName: 'Import: Oracle Linux (docker.io)'
  type: boolean
  default: true

# Docker Hub authentication (optional - for higher rate limits)
# To generate a Docker Hub PAT:
#   1. Log in to https://hub.docker.com
#   2. Click your profile icon → Account Settings → Security
#   3. Click "New Access Token"
#   4. Give it a description (e.g., "ACR Import") and select "Read-only" access
#   5. Click "Generate" and copy the token
# Rate limits:
#   - Anonymous: 100 pulls per 6 hours (per IP)
#   - Authenticated (free): 200 pulls per 6 hours
#   - Authenticated (Pro/Team): Much higher limits
- name: dockerHubUsername
  displayName: 'Docker Hub Username (optional - leave empty for anonymous)'
  type: string
  default: ''

- name: dockerHubPat
  displayName: 'Docker Hub PAT (optional - leave empty for anonymous)'
  type: string
  default: ''

- name: buildPythonImages
  displayName: 'Build custom Python images with Rust pre-installed'
  type: boolean
  default: true

- name: buildUbuntuImages
  displayName: 'Build Rust build images'
  type: boolean
  default: true

# GitHub Container Registry (GHCR) mirror.
# To also publish images to GHCR, define a SECRET pipeline variable named
# GHCR_TOKEN (a GitHub PAT with write:packages), settable at queue time. If
# GHCR_TOKEN is not set, the GHCR publish steps are skipped entirely.
- name: ghcrUsername
  displayName: 'GitHub username for the PAT (required only when GHCR_TOKEN is set)'
  type: string
  default: ''

- name: ghcrOrg
  displayName: 'GHCR namespace (owner or owner/repo)'
  type: string
  default: 'microsoft/mssql-rs'

schedules:
- cron: "0 3 * * 1"
  displayName: Weekly Python image build (Monday 3 AM UTC)
  branches:
    include:
    - development
    exclude:
    - main
  always: true

variables:
  ACR_NAME: 'tdslibrs'
  ACR_REGISTRY: 'tdslibrs.azurecr.io'
  GHCR_REGISTRY: 'ghcr.io'
  GHCR_NAMESPACE: 'ghcr.io/${{ parameters.ghcrOrg }}'

# =============================================================================
# STAGE 1 (Import): Sync base images from public registries (incl. Docker Hub) to ACR
# Runs ONLY when Docker Hub credentials are provided (dockerHubUsername +
# dockerHubPat). Leave either empty to SKIP the entire import phase.
# Each image group runs as its own parallel job on a separate agent to spread
# Docker Hub pulls and avoid rate limits. Individual groups can be skipped via
# the per-image toggle parameters.
# =============================================================================

stages:
- stage: Import_Base_Images
  displayName: 'Import base images (Docker/public -> ACR)'
  dependsOn: []
  condition: and(ne('${{ parameters.dockerHubUsername }}', ''), ne('${{ parameters.dockerHubPat }}', ''))
  jobs:
  # PyPA manylinux images (quay.io - no Docker Hub rate limit)
  - job: Manylinux
    displayName: 'Import manylinux x64 & arm64'
    condition: eq('${{ parameters.syncManylinux }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_34 x64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_34_x86_64:latest \
            --image import/python-build/manylinux_2_34_x86_64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_34 arm64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_34_aarch64:latest \
            --image import/python-build/manylinux_2_34_aarch64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_28 x64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_28_x86_64:latest \
            --image import/python-build/manylinux_2_28_x86_64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_28 arm64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_28_aarch64:latest \
            --image import/python-build/manylinux_2_28_aarch64:latest \
            --force
      retryCountOnTaskFailure: 3

  # PyPA musllinux images (quay.io - no Docker Hub rate limit)
  - job: Musllinux
    displayName: 'Import musllinux x64 & arm64'
    condition: eq('${{ parameters.syncMusllinux }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import musllinux x64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/musllinux_1_2_x86_64:latest \
            --image import/python-build/musllinux_1_2_x86_64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import musllinux arm64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/musllinux_1_2_aarch64:latest \
            --image import/python-build/musllinux_1_2_aarch64:latest \
            --force
      retryCountOnTaskFailure: 3

  # Ubuntu images (Docker Hub - rate limited)
  - job: Ubuntu
    displayName: 'Import Ubuntu 22.04 & 24.04'
    condition: eq('${{ parameters.syncUbuntu }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import Ubuntu 22.04'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/ubuntu:22.04 \
            --image import/ubuntu:22.04 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import Ubuntu 24.04'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/ubuntu:24.04 \
            --image import/ubuntu:24.04 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3

  # Alpine 3.18 & 3.19 (Docker Hub - rate limited)
  - job: Alpine1
    displayName: 'Import Alpine 3.18 & 3.19'
    condition: eq('${{ parameters.syncAlpine1 }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import Alpine 3.18'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/alpine:3.18 \
            --image import/alpine:3.18 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import Alpine 3.19'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/alpine:3.19 \
            --image import/alpine:3.19 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3

  # Alpine 3.20 & 3.21 (Docker Hub - rate limited)
  - job: Alpine2
    displayName: 'Import Alpine 3.20 & 3.21'
    condition: eq('${{ parameters.syncAlpine2 }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import Alpine 3.20'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/alpine:3.20 \
            --image import/alpine:3.20 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import Alpine 3.21'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/alpine:3.21 \
            --image import/alpine:3.21 \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3

  # Debian & RHEL (Docker Hub - rate limited)
  - job: DebianRHEL
    displayName: 'Import Debian & RHEL UBI9'
    condition: eq('${{ parameters.syncDebianRHEL }}', 'true')
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import Debian Bookworm'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
            echo "Using anonymous Docker Hub access"
          fi
          az acr import \
            --name $(ACR_NAME) \
            --source docker.io/library/debian:bookworm \
            --image import/debian:bookworm \
            $AUTH_ARGS \
            --force
      env:
        DOCKER_USER: ${{ parameters.dockerHubUsername }}
        DOCKER_PAT: ${{ parameters.dockerHubPat }}
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import Red Hat UBI9'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AUTH_ARGS=""
          if [[ -n "$DOCKER_USER" && -n "$DOCKER_PAT" ]]; then
            echo "Using authenticated Docker Hub access"
            AUTH_ARGS="--username $DOCKER_USER --password $DOCKER_PAT"
          else
