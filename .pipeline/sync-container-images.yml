# Weekly scheduled pipeline to sync and build Python wheel build images
# This pipeline:
# 1. Imports vanilla base images from public registries to ACR (distributed across parallel stages to avoid rate limits)
# 2. Builds custom images with Rust and maturin pre-installed
# 3. Pushes custom images to ACR for use in CI/CD
# Runs every Monday at 3:00 AM UTC

trigger: none

parameters:
- name: importBaseImages
  displayName: 'Import base images from public registries to ACR'
  type: boolean
  default: false

# Fine-grained sync controls (only used when importBaseImages=true)
- name: syncManylinux
  displayName: '  ├─ Sync PyPA manylinux (quay.io)'
  type: boolean
  default: true

- name: syncMusllinux
  displayName: '  ├─ Sync PyPA musllinux (quay.io)'
  type: boolean
  default: true

- name: syncUbuntu
  displayName: '  ├─ Sync Ubuntu (docker.io)'
  type: boolean
  default: true

- name: syncAlpine1
  displayName: '  ├─ Sync Alpine 3.18-3.19 (docker.io)'
  type: boolean
  default: true

- name: syncAlpine2
  displayName: '  ├─ Sync Alpine 3.20-3.21 (docker.io)'
  type: boolean
  default: true

- name: syncDebianRHEL
  displayName: '  ├─ Sync Debian & RHEL (docker.io)'
  type: boolean
  default: true

- name: syncOracle
  displayName: '  └─ Sync Oracle Linux (docker.io)'
  type: boolean
  default: true

# Docker Hub authentication (optional - for higher rate limits)
# To generate a Docker Hub PAT:
#   1. Log in to https://hub.docker.com
#   2. Click your profile icon → Account Settings → Security
#   3. Click "New Access Token"
#   4. Give it a description (e.g., "ACR Import") and select "Read-only" access
#   5. Click "Generate" and copy the token
# Rate limits:
#   - Anonymous: 100 pulls per 6 hours (per IP)
#   - Authenticated (free): 200 pulls per 6 hours
#   - Authenticated (Pro/Team): Much higher limits
- name: dockerHubUsername
  displayName: 'Docker Hub Username (optional - leave empty for anonymous)'
  type: string
  default: ''

- name: dockerHubPat
  displayName: 'Docker Hub PAT (optional - leave empty for anonymous)'
  type: string
  default: ''

- name: buildPythonImages
  displayName: 'Build custom Python images with Rust pre-installed'
  type: boolean
  default: true

- name: buildUbuntuImages
  displayName: 'Build Rust build images'
  type: boolean
  default: true

# GitHub Container Registry (GHCR) mirror.
# Provide a GitHub PAT with write:packages to also publish the images to GHCR so
# the PR/validation pipeline can pull them anonymously (once the packages are
# made Public). Leave ghcrPat empty to SKIP the GHCR sync entirely.
- name: ghcrPat
  displayName: 'GitHub PAT (write:packages) — leave EMPTY to skip GHCR sync'
  type: string
  default: ''

- name: ghcrUsername
  displayName: 'GitHub username for the PAT (required only when ghcrPat is set)'
  type: string
  default: ''

- name: ghcrOrg
  displayName: 'GHCR namespace (owner or owner/repo)'
  type: string
  default: 'microsoft/mssql-rs'

schedules:
- cron: "0 3 * * 1"
  displayName: Weekly Python image build (Monday 3 AM UTC)
  branches:
    include:
    - development
    exclude:
    - main
  always: true

variables:
  ACR_NAME: 'tdslibrs'
  ACR_REGISTRY: 'tdslibrs.azurecr.io'
  GHCR_REGISTRY: 'ghcr.io'
  GHCR_NAMESPACE: 'ghcr.io/${{ parameters.ghcrOrg }}'

# =============================================================================
# STAGE 1: Import base images from public registries (distributed to avoid rate limits)
# Each stage runs on a separate agent and imports max 2 images
# All sync stages run in parallel
# =============================================================================

stages:
# -----------------------------------------------------------------------------
# Sync Stage 1: PyPA manylinux images (quay.io - no Docker Hub rate limit)
# -----------------------------------------------------------------------------
- stage: Sync_PyPA_Manylinux
  displayName: 'Sync: PyPA Manylinux'
  dependsOn: []
  condition: and(eq('${{ parameters.importBaseImages }}', 'true'), eq('${{ parameters.syncManylinux }}', 'true'))
  jobs:
  - job: SyncImages
    displayName: 'Import manylinux x64 & arm64'
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_34 x64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_34_x86_64:latest \
            --image import/python-build/manylinux_2_34_x86_64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_34 arm64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_34_aarch64:latest \
            --image import/python-build/manylinux_2_34_aarch64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_28 x64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_28_x86_64:latest \
            --image import/python-build/manylinux_2_28_x86_64:latest \
            --force
      retryCountOnTaskFailure: 3
    - task: AzureCLI@2
      displayName: 'Import manylinux_2_28 arm64'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr import \
            --name $(ACR_NAME) \
            --source quay.io/pypa/manylinux_2_28_aarch64:latest \
            --image import/python-build/manylinux_2_28_aarch64:latest \
            --force
      retryCountOnTaskFailure: 3

