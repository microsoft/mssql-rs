# =============================================================================
# SCRATCH pipeline: validate the ACR -> GHCR mirror approach
# =============================================================================
# This is a throwaway validation pipeline used to prove out the design in ADO
# task #45942 (mirror CI container images from ACR to GHCR so the PR/validation
# pipeline can pull anonymously, without authenticating to ACR).
#
# What it does:
#   1. Logs in to ACR (existing 'Magnitude Test' service connection).
#   2. Logs in to GHCR using EITHER a PAT or a GitHub App installation token.
#        - For the App path it prints the *granted* permissions returned by the
#          installation-token API. That is the authoritative, UI-independent way
#          to confirm the App has `packages: write`.
#   3. Mirrors the full set of images the validation pipeline consumes from
#      ACR -> GHCR using `docker buildx imagetools create` (multi-arch safe).
#   4. Verifies anonymous (credential-less) pulls from GHCR. This only succeeds
#      once each GHCR package has been made PUBLIC in the org UI/API, so it is
#      informational on the first run (continueOnError).
#
# -----------------------------------------------------------------------------
# REQUIRED secret pipeline variables (set in the ADO pipeline UI, not here):
#   When ghcrAuthMethod = 'pat':
#     GHCR_TOKEN              - a PAT with write:packages (scratch / short-lived)
#   When ghcrAuthMethod = 'app':
#     GHCR_APP_ID             - GitHub App ID
#     GHCR_APP_PEM            - GitHub App private key (full PEM contents)
#     GHCR_APP_INSTALLATION_ID- (optional) installation id; auto-discovered from
#                               the org owner of ghcrOrg if left unset
# =============================================================================

trigger: none

parameters:
- name: ghcrOrg
  displayName: 'GHCR namespace (owner or owner/repo)'
  type: string
  default: 'microsoft/mssql-rs'

- name: ghcrAuthMethod
  displayName: 'GHCR auth method'
  type: string
  default: 'pat'
  values:
  - pat
  - app

- name: ghcrUsername
  displayName: 'GHCR username (PAT auth only; App uses x-access-token)'
  type: string
  default: 'x-access-token'

- name: doMirror
  displayName: 'Mirror images ACR -> GHCR'
  type: boolean
  default: true

- name: verifyAnonymousPull
  displayName: 'Verify anonymous pull from GHCR (needs packages set Public)'
  type: boolean
  default: true

variables:
  ACR_NAME: 'tdslibrs'
  ACR_REGISTRY: 'tdslibrs.azurecr.io'
  GHCR_REGISTRY: 'ghcr.io'
  GHCR_NAMESPACE: 'ghcr.io/${{ parameters.ghcrOrg }}'

stages:
- stage: Mirror_To_GHCR
  displayName: 'Validate ACR -> GHCR mirror'
  dependsOn: []
  jobs:
  - job: MirrorImages
    displayName: 'Mirror images and verify anonymous pull'
    timeoutInMinutes: 60
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - checkout: none

    # -------------------------------------------------------------------------
    # Shared image list. Source path == target path; only the registry host
    # differs:  tdslibrs.azurecr.io/<path>:<tag>  ->  ghcr.io/<org>/<path>:<tag>
    # -------------------------------------------------------------------------
    - script: |
        set -euo pipefail
        mkdir -p "$(Pipeline.Workspace)/ghcr"
        cat > "$(Pipeline.Workspace)/ghcr/images.txt" <<'EOF'
        python-build/manylinux_2_34_x86_64_rust:latest
        python-build/manylinux_2_34_aarch64_rust:latest
        python-build/musllinux_1_2_x86_64_rust:latest
        python-build/musllinux_1_2_aarch64_rust:latest
        build/ubuntu:22.04
        build/alpine:3.18
        import/debian:bookworm
        import/alpine:3.18
        import/alpine:3.19
        import/alpine:3.20
        import/alpine:3.21
        import/ubuntu:22.04
        import/ubuntu:24.04
        import/redhat/ubi9:latest
        import/oraclelinux:9
        EOF
        echo "Images to mirror:"
        sed 's/^/  /' "$(Pipeline.Workspace)/ghcr/images.txt"
      displayName: 'Define image list'

    # -------------------------------------------------------------------------
    # Log in to ACR so buildx imagetools can READ the source images.
    # -------------------------------------------------------------------------
    - task: AzureCLI@2
      displayName: 'Login to ACR (read source images)'
      inputs:
        azureSubscription: 'Magnitude Test'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail
          az acr login --name $(ACR_NAME)

    # -------------------------------------------------------------------------
    # GHCR login via GitHub App installation token.
    # Prints the granted permissions so you can confirm packages:write without
    # access to the App settings UI.
    # -------------------------------------------------------------------------
    - ${{ if eq(parameters.ghcrAuthMethod, 'app') }}:
      - script: |
          set -euo pipefail
          python3 -m pip install --quiet --disable-pip-version-check pyjwt cryptography requests \
            || python3 -m pip install --quiet --disable-pip-version-check --break-system-packages pyjwt cryptography requests

          OWNER="$(echo "${{ parameters.ghcrOrg }}" | cut -d/ -f1)"

          TOKEN=$(python3 - "$OWNER" <<'PY'
          import os, sys, time, json
          import jwt, requests

          owner = sys.argv[1]
          app_id = os.environ["GHCR_APP_ID"].strip()
          pem = os.environ["GHCR_APP_PEM"]
          inst_id = os.environ.get("GHCR_APP_INSTALLATION_ID", "").strip()

          now = int(time.time())
          assertion = jwt.encode(
              {"iat": now - 60, "exp": now + 540, "iss": app_id},
              pem, algorithm="RS256")
          h = {"Authorization": f"Bearer {assertion}",
               "Accept": "application/vnd.github+json"}

          app = requests.get("https://api.github.com/app", headers=h)
          app.raise_for_status()
          sys.stderr.write(f"APP slug={app.json().get('slug')} "
                           f"default_perms={app.json().get('permissions')}\n")

          if not inst_id:
              insts = requests.get("https://api.github.com/app/installations", headers=h)
              insts.raise_for_status()
              sys.stderr.write("Installations visible to this App:\n")
              for i in insts.json():
                  acct = i["account"]["login"]
                  sys.stderr.write(f"  install_id={i['id']} account={acct} "
                                   f"packages={i['permissions'].get('packages')}\n")
                  if acct.lower() == owner.lower():
                      inst_id = str(i["id"])
              if not inst_id:
                  sys.stderr.write(f"ERROR: no installation found for owner '{owner}'\n")
                  sys.exit(1)

          r = requests.post(
              f"https://api.github.com/app/installations/{inst_id}/access_tokens",
              headers=h, data=json.dumps({"permissions": {"packages": "write"}}))
          if r.status_code >= 300:
              sys.stderr.write(f"ERROR minting token ({r.status_code}): {r.text}\n")
              sys.exit(1)
          body = r.json()
          sys.stderr.write(f"GRANTED token permissions: {body.get('permissions')}\n")
          print(body["token"])
          PY
          )

          echo "$TOKEN" | docker login $(GHCR_REGISTRY) -u x-access-token --password-stdin
          echo "Logged in to GHCR via GitHub App installation token."
        displayName: 'Login to GHCR (GitHub App) + print granted permissions'
        env:
          GHCR_APP_ID: $(GHCR_APP_ID)
          GHCR_APP_PEM: $(GHCR_APP_PEM)
          GHCR_APP_INSTALLATION_ID: $(GHCR_APP_INSTALLATION_ID)

    # -------------------------------------------------------------------------
    # GHCR login via PAT (scratch / short-lived).
    # -------------------------------------------------------------------------
    - ${{ if eq(parameters.ghcrAuthMethod, 'pat') }}:
      - script: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login $(GHCR_REGISTRY) -u "${{ parameters.ghcrUsername }}" --password-stdin
          echo "Logged in to GHCR via PAT."
        displayName: 'Login to GHCR (PAT)'
        env:
          GHCR_TOKEN: $(GHCR_TOKEN)

    # -------------------------------------------------------------------------
    # Mirror ACR -> GHCR. buildx imagetools copies manifest lists as-is, so
    # multi-arch images (build/ubuntu, build/alpine) keep amd64 + arm64.
    # -------------------------------------------------------------------------
    - ${{ if eq(parameters.doMirror, true) }}:
      - script: |
          set -euo pipefail
          FAIL=0
          while read -r img; do
            [ -z "$img" ] && continue
            src="$(ACR_REGISTRY)/${img}"
            dst="$(GHCR_NAMESPACE)/${img}"
            echo "==> mirroring ${src} -> ${dst}"
            if docker buildx imagetools create -t "$dst" "$src"; then
              echo "    OK"
            else
              echo "    FAILED: ${src}"
              FAIL=1
            fi
          done < "$(Pipeline.Workspace)/ghcr/images.txt"
          if [ "$FAIL" -ne 0 ]; then
            echo "One or more images failed to mirror."
            exit 1
          fi
          echo "All images mirrored to GHCR."
        displayName: 'Mirror images ACR -> GHCR'
        retryCountOnTaskFailure: 3

    # -------------------------------------------------------------------------
    # Verify anonymous pulls. Uses an empty DOCKER_CONFIG so NO credentials are
    # present. Succeeds only for packages whose visibility is Public.
    # -------------------------------------------------------------------------
    - ${{ if eq(parameters.verifyAnonymousPull, true) }}:
      - script: |
          set -uo pipefail
          ANON_CFG="$(mktemp -d)"
          echo "Pulling with empty docker config (no credentials): $ANON_CFG"
          NOTPUBLIC=0
          while read -r img; do
            [ -z "$img" ] && continue
            dst="$(GHCR_NAMESPACE)/${img}"
            echo "==> anonymous pull ${dst}"
            if DOCKER_CONFIG="$ANON_CFG" docker pull "$dst" >/dev/null 2>&1; then
              echo "    PUBLIC (anonymous pull OK)"
            else
              echo "    NOT PUBLIC yet (set this package's visibility to Public)"
              NOTPUBLIC=1
            fi
          done < "$(Pipeline.Workspace)/ghcr/images.txt"
          if [ "$NOTPUBLIC" -ne 0 ]; then
            echo ""
            echo "Some packages are not public. Make each package Public at:"
            echo "  https://github.com/orgs/$(echo '${{ parameters.ghcrOrg }}' | cut -d/ -f1)/packages"
          fi
        displayName: 'Verify anonymous pull from GHCR'
        continueOnError: true

    - script: |
        echo "======================================================"
        echo "GHCR mirror validation summary"
        echo "======================================================"
        echo "Target namespace: $(GHCR_NAMESPACE)"
        echo "Auth method:      ${{ parameters.ghcrAuthMethod }}"
        echo ""
        echo "Mirrored images:"
        sed 's#^#  $(GHCR_NAMESPACE)/#' "$(Pipeline.Workspace)/ghcr/images.txt"
      displayName: 'Summary'
