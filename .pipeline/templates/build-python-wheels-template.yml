parameters:
- name: osType  # defaults for any parameters that aren't specified
  default: Linux
  type: string
  values:
  - Linux
  - MacOS
  - Alpine
  - Windows
- name: architecture
  default: x64
  type: string
- name: pythonVersions
  type: object
  default:
  - '3.10'
  - '3.11'
  - '3.12'
  - '3.13'
  - '3.14'
- name: publishArtifacts
  type: boolean
  default: true
  displayName: 'Publish wheel artifacts (disable for OneBranch pipeline)'
- name: signWindowsWheels
  type: boolean
  default: false
  displayName: 'Sign Windows native extensions inside Python wheels'
- name: esrpConnectedServiceName
  type: string
  default: 'ESRP Managed Identity federated auth - AME tenant-mssql-rs'

steps:
# Container-based builds for Linux (glibc - manylinux)
- ${{ if eq(parameters.osType, 'Linux') }}:
  - script: |
      set -euo pipefail
      
      # Determine container image based on architecture
      # Using pre-built images with Rust and maturin pre-installed for faster builds
      if [ "${{ parameters.architecture }}" = "x64" ]; then
        CONTAINER_IMAGE="ghcr.io/microsoft/mssql-rs/python-build/manylinux_2_34_x86_64_rust:latest"
      elif [ "${{ parameters.architecture }}" = "ARM64" ] || [ "${{ parameters.architecture }}" = "arm64" ]; then
        CONTAINER_IMAGE="ghcr.io/microsoft/mssql-rs/python-build/manylinux_2_34_aarch64_rust:latest"
      else
        echo "ERROR: Unsupported architecture: ${{ parameters.architecture }}"
        exit 1
      fi
      
      echo "Building Python wheels in container: $CONTAINER_IMAGE"
      
      mkdir -p "$(ob_outputDirectory)/wheels"
      mkdir -p "$(ob_outputDirectory)/symbols/${{ parameters.osType }}_${{ parameters.architecture }}"
      
      bash .pipeline/scripts/docker-cargo-run.sh --rm \
        -v "$(Build.SourcesDirectory):/workspace" \
        -v "$(ob_outputDirectory)/wheels:/workspace/target/wheels" \
        -v "$(ob_outputDirectory)/symbols/${{ parameters.osType }}_${{ parameters.architecture }}:/workspace/target/symbols" \
        -e "WORKSPACE_DIR=/workspace" \
        -e "OUTPUT_DIR=/workspace/target/wheels" \
        -e "SYMBOLS_OUTPUT_DIR=/workspace/target/symbols" \
        "$CONTAINER_IMAGE" \
        bash /workspace/scripts/build-python-wheels-in-container.sh
      
      # Fix permissions on any files created by the container
      sudo chown -R $(whoami):$(whoami) "$(Build.SourcesDirectory)/mssql-py-core/target" || true
      sudo chown -R $(whoami):$(whoami) "$(ob_outputDirectory)/symbols" || true
      
      set -o pipefail
      WHEEL_COUNT=$(find "$(ob_outputDirectory)/wheels" -type f -name '*.whl' | wc -l)
      if [ "$WHEEL_COUNT" -eq 0 ]; then
        echo "ERROR: No wheels were produced by the manylinux build!"
        exit 1
      fi
      echo "✅ $WHEEL_COUNT wheels built successfully!"
      ls -lh "$(ob_outputDirectory)/wheels"
      echo "--- Debug symbols captured ---"
      find "$(ob_outputDirectory)/symbols" -type f 2>/dev/null | xargs -r ls -lh || true
    displayName: 'Build Python wheels in manylinux container (${{ parameters.architecture }})'
    env:
      CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
      CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

# Native builds for MacOS (no Windows support)
# Native builds for MacOS (universal2 = x86_64 + ARM64 in single binary)
- ${{ if eq(parameters.osType, 'MacOS') }}:
  - script: |
      echo "Installing maturin via pipx..."
      python3 -m pip install --user pipx
      python3 -m pipx ensurepath
      export PATH="$HOME/.local/bin:$PATH"
      pipx install maturin
      
      echo "Installing Rust targets for universal2 build..."
      rustup target add x86_64-apple-darwin
      rustup target add aarch64-apple-darwin
    displayName: Install maturin and Rust targets

  - ${{ each pythonVersion in parameters.pythonVersions }}:
    - task: UsePythonVersion@0
      displayName: 'Use Python ${{ pythonVersion }}'
      inputs:
        versionSpec: '${{ pythonVersion }}'
        addToPath: true
    
    - script: |
        echo "Building universal2 Python wheel for Python ${{ pythonVersion }}..."
        export PATH="$HOME/.local/bin:$PATH"
        export MACOSX_DEPLOYMENT_TARGET=15.0
        python${{ pythonVersion }} --version
        cd mssql-py-core
        maturin build --release --target universal2-apple-darwin --interpreter python${{ pythonVersion }} --out $(ob_outputDirectory)/wheels
        echo "Universal2 wheel built successfully for Python ${{ pythonVersion }}"

        # Collect .dSYM bundles emitted by split-debuginfo="packed" immediately
        # after this interpreter's build — the next Python version's build reuses
        # target/release/deps and would overwrite them.
        PY_TAG="cp$(echo ${{ pythonVersion }} | tr -d .)"
        SYM_DEST="$(ob_outputDirectory)/symbols/MacOS_universal2/$PY_TAG"
        mkdir -p "$SYM_DEST"
        # dSYM is a directory; tar it so it survives artifact publish.
        for dsym in target/universal2-apple-darwin/release/deps/libmssql_py_core*.dSYM \
                    target/release/deps/libmssql_py_core*.dSYM ; do
          [ -d "$dsym" ] || continue
          tar -czf "$SYM_DEST/$(basename "$dsym").tgz" -C "$(dirname "$dsym")" "$(basename "$dsym")"
          echo "Captured dSYM: $dsym -> $SYM_DEST/$(basename "$dsym").tgz"
        done
      displayName: 'Build universal2 wheel for Python ${{ pythonVersion }} (MacOS)'
  
  - script: |
      echo "Re-tagging macOS wheels to use single universal2 platform tag..."
      export PATH="$HOME/.local/bin:$PATH"
      pip install wheel
      for whl in $(ob_outputDirectory)/wheels/*.whl; do
        echo "Re-tagging: $(basename $whl)"
        wheel tags --platform-tag macosx_15_0_universal2 --remove "$whl"
      done
      echo "All wheels re-tagged:"
      ls -lh $(ob_outputDirectory)/wheels
    displayName: 'Re-tag macOS wheels to uniform platform tag'

# Container-based builds for Alpine (musl - musllinux)
- ${{ if eq(parameters.osType, 'Alpine') }}:
  - script: |
      set -euo pipefail
      
      # Determine container image based on architecture
      # Using pre-built images with Rust and maturin pre-installed for faster builds
      if [ "${{ parameters.architecture }}" = "x64" ]; then
        CONTAINER_IMAGE="ghcr.io/microsoft/mssql-rs/python-build/musllinux_1_2_x86_64_rust:latest"
      elif [ "${{ parameters.architecture }}" = "ARM64" ] || [ "${{ parameters.architecture }}" = "arm64" ]; then
        CONTAINER_IMAGE="ghcr.io/microsoft/mssql-rs/python-build/musllinux_1_2_aarch64_rust:latest"
      else
        echo "ERROR: Unsupported architecture: ${{ parameters.architecture }}"
        exit 1
      fi
      
      echo "Building Python wheels in container: $CONTAINER_IMAGE"
      
      mkdir -p "$(ob_outputDirectory)/wheels"
      mkdir -p "$(ob_outputDirectory)/symbols/${{ parameters.osType }}_${{ parameters.architecture }}"
      
      bash .pipeline/scripts/docker-cargo-run.sh --rm \
        -v "$(Build.SourcesDirectory):/workspace" \
        -v "$(ob_outputDirectory)/wheels:/workspace/target/wheels" \
        -v "$(ob_outputDirectory)/symbols/${{ parameters.osType }}_${{ parameters.architecture }}:/workspace/target/symbols" \
        -e "WORKSPACE_DIR=/workspace" \
        -e "OUTPUT_DIR=/workspace/target/wheels" \
        -e "SYMBOLS_OUTPUT_DIR=/workspace/target/symbols" \
        "$CONTAINER_IMAGE" \
        bash /workspace/scripts/build-python-wheels-in-container.sh
      
      # Fix permissions on any files created by the container
      sudo chown -R $(whoami):$(whoami) "$(Build.SourcesDirectory)/mssql-py-core/target" || true
      sudo chown -R $(whoami):$(whoami) "$(ob_outputDirectory)/symbols" || true
      
      WHEEL_COUNT=$(find "$(ob_outputDirectory)/wheels" -name '*.whl' | wc -l)
      if [ "$WHEEL_COUNT" -eq 0 ]; then
        echo "ERROR: No wheels were produced by the musllinux build!"
        exit 1
      fi
      echo "✅ $WHEEL_COUNT wheels built successfully!"
      ls -lh "$(ob_outputDirectory)/wheels"
      echo "--- Debug symbols captured ---"
      find "$(ob_outputDirectory)/symbols" -type f 2>/dev/null | xargs -r ls -lh || true
    displayName: 'Build Python wheels in musllinux container (${{ parameters.architecture }})'
    env:
      CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_PUBLIC_TOKEN)
      CARGO_REGISTRIES_MSSQL_RS_TOKEN: $(CARGO_REGISTRIES_MSSQL_RS_TOKEN)

# Native builds for Windows
- ${{ if eq(parameters.osType, 'Windows') }}:
  - ${{ each pythonVersion in parameters.pythonVersions }}:
    - task: UsePythonVersion@0
      displayName: 'Use Python ${{ pythonVersion }}'
      inputs:
        versionSpec: '${{ pythonVersion }}'
        architecture: '${{ parameters.architecture }}'
        addToPath: true
    
    - pwsh: |
        $ErrorActionPreference = 'Stop'
        
        Write-Host "Building Python wheel for Python ${{ pythonVersion }}..."
        python --version
        
        # Install build tooling (maturin) and wheel utilities for this Python version
        pip install maturin wheel
        
        # Create wheels output directory
        New-Item -ItemType Directory -Force -Path "$(ob_outputDirectory)\wheels" | Out-Null
        
        # Build the wheel
        Push-Location mssql-py-core
        maturin build --release --interpreter python --out "$(ob_outputDirectory)\wheels"
        if ($LASTEXITCODE -ne 0) { throw "maturin build failed" }
        Pop-Location
        
        Write-Host "Wheel built successfully for Python ${{ pythonVersion }}"

        # Collect .pdb files emitted by cargo (debug="full") immediately after
        # this interpreter's build. The next Python version's build reuses
        # target\release\deps and would overwrite the pdb.
        $pyTag = "cp${{ pythonVersion }}".Replace('.', '')
        $symDest = "$(ob_outputDirectory)\symbols\Windows_${{ parameters.architecture }}\$pyTag"
        New-Item -ItemType Directory -Force -Path $symDest | Out-Null

        # CARGO_TARGET_DIR may point outside the sources dir (Windows sets it to
        # C:\cargo_target_dir); search there first, fall back to in-tree target.
        $targetRoots = @()
        if ($env:CARGO_TARGET_DIR) { $targetRoots += $env:CARGO_TARGET_DIR }
        $targetRoots += "$(Build.SourcesDirectory)\mssql-py-core\target"
        $targetRoots += "$(Build.SourcesDirectory)\target"

        $pdbs = @()
        foreach ($root in $targetRoots) {
          if (Test-Path $root) {
            $pdbs += Get-ChildItem -Path $root -Recurse -File -Filter 'mssql_py_core*.pdb' -ErrorAction SilentlyContinue
          }
        }
        if ($pdbs.Count -eq 0) {
          Write-Warning "No .pdb files found for Python ${{ pythonVersion }} under: $($targetRoots -join '; ')"
        } else {
          foreach ($pdb in $pdbs) {
            Copy-Item -Path $pdb.FullName -Destination $symDest -Force
            Write-Host "Captured PDB: $($pdb.FullName) -> $symDest"
          }
        }
      displayName: 'Build wheel for Python ${{ pythonVersion }} (Windows ${{ parameters.architecture }})'

  - ${{ if eq(parameters.signWindowsWheels, true) }}:
    - pwsh: |
        $ErrorActionPreference = 'Stop'

        $wheelsDir = "$(ob_outputDirectory)\wheels"
        $unsignedDir = "$(ob_outputDirectory)\unsigned-wheels"
        $unpackedRoot = "$(ob_outputDirectory)\wheel-unpacked"

        Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $unsignedDir, $unpackedRoot
        New-Item -ItemType Directory -Force -Path $unsignedDir, $unpackedRoot | Out-Null

        $wheels = @(Get-ChildItem $wheelsDir -Filter *.whl -File)
        if ($wheels.Count -eq 0) {
          Write-Error "No Windows wheels found to sign in $wheelsDir"
          exit 1
        }

        foreach ($wheel in $wheels) {
          Move-Item -Path $wheel.FullName -Destination $unsignedDir
        }

        foreach ($wheel in Get-ChildItem $unsignedDir -Filter *.whl -File) {
          Write-Host "Unpacking $($wheel.Name)"
          $wheelUnpackDir = Join-Path $unpackedRoot $wheel.BaseName
          New-Item -ItemType Directory -Force -Path $wheelUnpackDir | Out-Null
          python -m wheel unpack "$($wheel.FullName)" --dest "$wheelUnpackDir"
        }

        $nativeFiles = @(Get-ChildItem $unpackedRoot -Recurse -Include *.pyd,*.dll -File)
        if ($nativeFiles.Count -eq 0) {
          Write-Error "No native Windows binaries (*.pyd, *.dll) found in unpacked wheels"
          exit 1
        }

        Write-Host "Native binaries to sign:"
        $nativeFiles | ForEach-Object { Write-Host "  $($_.FullName)" }
      displayName: 'Unpack Windows wheels for ESRP signing'

    - task: EsrpMalwareScanning@6
      displayName: 'ESRP Malware Scanning Windows wheel binaries'
      inputs:
        ConnectedServiceName: '${{ parameters.esrpConnectedServiceName }}'
        AppRegistrationClientId: '$(appRegistrationClientId)'
        AppRegistrationTenantId: '$(appRegistrationTenantId)'
        EsrpClientId: '$(EsrpClientId)'
        FolderPath: '$(ob_outputDirectory)\wheel-unpacked'
        Pattern: |
          **/*.pyd
          **/*.dll
        UseMinimatch: true
        UseMSIAuthentication: true
        CleanupTempStorage: true
        VerboseLogin: true

    - task: EsrpCodeSigning@6
      displayName: 'ESRP CodeSigning Windows wheel binaries'
      inputs:
        ConnectedServiceName: '${{ parameters.esrpConnectedServiceName }}'
        UseMSIAuthentication: true
        AppRegistrationClientId: '$(appRegistrationClientId)'
        AppRegistrationTenantId: '$(appRegistrationTenantId)'
        EsrpClientId: '$(EsrpClientId)'
        AuthAKVName: '$(AuthAKVName)'
        AuthSignCertName: '$(AuthSignCertName)'
        FolderPath: '$(ob_outputDirectory)\wheel-unpacked'
        Pattern: |
          **/*.pyd
          **/*.dll
        UseMinimatch: true
        signConfigType: inlineSignParams
        inlineOperation: |
          [
            {
              "KeyCode": "CP-230012",
              "OperationCode": "SigntoolSign",
              "ToolName": "sign",
              "ToolVersion": "1.0",
              "Parameters": {
                "OpusName": "Microsoft",
                "OpusInfo": "https://www.microsoft.com",
                "FileDigest": "/fd SHA256",
                "PageHash": "/NPH",
                "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
              }
            },
            {
              "KeyCode": "CP-230012",
              "OperationCode": "SigntoolVerify",
              "ToolName": "sign",
              "ToolVersion": "1.0",
              "Parameters": {}
            }
          ]
        VerboseLogin: true

    - pwsh: |
        $ErrorActionPreference = 'Stop'

        $wheelsDir = "$(ob_outputDirectory)\wheels"
        $unpackedRoot = "$(ob_outputDirectory)\wheel-unpacked"
        $signedDir = "$(ob_outputDirectory)\signed-wheels"
        $verifyRoot = "$(ob_outputDirectory)\wheel-verify"

        Remove-Item -Recurse -Force -ErrorAction SilentlyContinue $wheelsDir, $signedDir, $verifyRoot
        New-Item -ItemType Directory -Force -Path $wheelsDir, $signedDir, $verifyRoot | Out-Null

        foreach ($wheelRoot in Get-ChildItem $unpackedRoot -Directory) {
          $wheelDirs = @(Get-ChildItem $wheelRoot.FullName -Directory)
          if ($wheelDirs.Count -ne 1) {
            Write-Error "Expected one unpacked wheel directory under $($wheelRoot.FullName), found $($wheelDirs.Count)"
            exit 1
          }

          Write-Host "Repacking signed wheel from $($wheelDirs[0].FullName)"
          python -m wheel pack "$($wheelDirs[0].FullName)" --dest-dir "$signedDir"
        }

        $signedWheels = @(Get-ChildItem $signedDir -Filter *.whl -File)
        $unpackedWheels = @(Get-ChildItem $unpackedRoot -Directory)
        if ($signedWheels.Count -ne $unpackedWheels.Count) {
          Write-Error "Expected $($unpackedWheels.Count) signed wheels, found $($signedWheels.Count)"
          exit 1
        }

        Copy-Item -Path "$signedDir\*.whl" -Destination $wheelsDir

        foreach ($wheel in Get-ChildItem $wheelsDir -Filter *.whl -File) {
          Write-Host "Verifying signed wheel $($wheel.Name)"
          $wheelVerifyDir = Join-Path $verifyRoot $wheel.BaseName
          New-Item -ItemType Directory -Force -Path $wheelVerifyDir | Out-Null
          python -m wheel unpack "$($wheel.FullName)" --dest "$wheelVerifyDir"
        }

        $nativeFiles = @(Get-ChildItem $verifyRoot -Recurse -Include *.pyd,*.dll -File)
        if ($nativeFiles.Count -eq 0) {
          Write-Error "No native Windows binaries found after repacking signed wheels"
          exit 1
        }

        $invalid = @()
        foreach ($file in $nativeFiles) {
          $signature = Get-AuthenticodeSignature $file.FullName
          Write-Host "$($file.Name): $($signature.Status)"
          if ($signature.Status -ne 'Valid') {
            $invalid += $file.FullName
          }
        }

        if ($invalid.Count -gt 0) {
          Write-Error "Unsigned or invalid native binaries:`n$($invalid -join "`n")"
          exit 1
        }

        Remove-Item -Recurse -Force $unpackedRoot, $signedDir, $verifyRoot
      displayName: 'Repack and verify signed Windows wheels'
  
  - pwsh: |
      Write-Host "All wheels built:"
      Get-ChildItem "$(ob_outputDirectory)\wheels" | Format-Table Name, Length
    displayName: List all wheels

# Publish artifacts for CI/PR pipelines (not needed for OneBranch which uses ob_outputDirectory)
- ${{ if eq(parameters.publishArtifacts, true) }}:
  - task: PublishPipelineArtifact@1
    displayName: 'Publish Python wheels'
    inputs:
      targetPath: '$(ob_outputDirectory)/wheels'
      artifact: 'wheels_${{ parameters.osType }}_${{ parameters.architecture }}'
      publishLocation: 'pipeline'
