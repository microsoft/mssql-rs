#
# ODBC C++ gtest e2e steps for the Build_Windows job. Reuses the SQL Server the
# job already provisioned via sql-setup-template (localhost:1433, sa /
# $(SQL_PASSWORD)) instead of standing up a new instance. run_e2e.ps1 registers
# the freshly built driver in HKLM (Build_Windows runs elevated) and restores the
# prior registration on exit. PR-only; failing tests are retried via ctest
# until-pass so a flaky run does not fail the build.

parameters:
- name: retries
  displayName: Number of times to rerun a failing e2e test before failing the build
  type: number
  default: 3

steps:
- pwsh: |
    $ErrorActionPreference = 'Stop'
    $cmake = Get-Command cmake -ErrorAction SilentlyContinue
    if ($cmake) {
      & $cmake.Source --version
    } else {
      # cmake ships with VS2022 but its bin dir is not on PATH by default.
      $candidate = Get-ChildItem 'C:\Program Files\Microsoft Visual Studio' -Recurse `
        -Filter 'cmake.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
      if (-not $candidate) {
        throw 'cmake not found on the agent. It is required to build the ODBC e2e tests.'
      }
      Write-Host "Adding cmake to PATH for later steps: $($candidate.DirectoryName)"
      # prependpath only affects subsequent steps, so verify via the full path here.
      Write-Host "##vso[task.prependpath]$($candidate.DirectoryName)"
      & $candidate.FullName --version
    }
  displayName: 'ODBC e2e: ensure cmake is available'
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

- pwsh: |
    $ErrorActionPreference = 'Stop'
    ./mssql-odbc/tests/e2e/run_e2e.ps1 -Retries ${{ parameters.retries }}
  displayName: 'ODBC e2e: build driver and run tests'
  condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
  env:
    SQL_PASSWORD: $(SQL_PASSWORD)
    ODBC_TEST_SERVER: 'localhost,1433'
    ODBC_TEST_UID: sa
    ODBC_TEST_PWD: $(SQL_PASSWORD)
    ODBC_TEST_TRUST_CERT: 'Yes'
    RUST_BACKTRACE: full

- task: PublishTestResults@2
  condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'PullRequest'))
  displayName: 'Publish ODBC e2e test results'
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '$(Build.SourcesDirectory)/mssql-odbc/tests/e2e/build/junit-mssql-odbc.xml'
    testRunTitle: 'ODBC e2e (Windows)'
