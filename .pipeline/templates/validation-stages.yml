# Shared validation stages consumed by validation-pipeline.yml (development CI/PR)
# and validation-pipeline-ci.yml (GitHub main CI). Single source of truth for stages.

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: RunFuzz
  displayName: Run Fuzz Tests (30 min)
  type: boolean
  default: false

- name: RunLongHaul
  displayName: Run Long-Haul BCP Test (30 min)
  type: boolean
  default: false

- name: includeInfraStages
  displayName: Include infra stages (Long-Haul, Private Link Smoke) that require the 'Magnitude Test' service connection
  type: boolean
  default: true

- name: sqlInstanceMode
  displayName: SQL host cardinality for ARM test stages (shared = one SQL host per stage; per-job = one per matrix entry)
  type: string
  values:
  - shared
  - per-job
  default: shared

- name: sqlImageTag
  displayName: SQL Server docker image tag for ARM test stages
  type: string
  default: '2025-latest'

stages:
- stage: EvaluateDuplicate
  displayName: Evaluate PR duplicate
  condition: and(eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  jobs:
  - job: Evaluate
    displayName: Check prior successful PR validation
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - bash: |
        set -euo pipefail
        python3 .pipeline/scripts/evaluate-duplicate-pr.py
      name: SetDuplicateState
      displayName: Check duplicate PR head commit
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- stage: Build
  displayName: Build Stage
  dependsOn:
    - EvaluateDuplicate
  condition: >-
    and(
      not(canceled()),
      eq('${{ parameters.RunFuzz }}', 'false'),
      eq('${{ parameters.RunLongHaul }}', 'false'),
      or(
        ne(variables['Build.Reason'], 'PullRequest'),
        ne(dependencies.EvaluateDuplicate.outputs['Evaluate.SetDuplicateState.skipDuplicate'], 'true')
      )
    )
  jobs:
  # On-demand x64 SQL host for the ARM64 build's integration tests. ARM agents
  # cannot run the x64 SQL Server image natively, so Build_Linux_ARM connects
  # cross-pool to this host instead. PR-only: the ARM build only runs its test
  # pass on PRs, and this job would otherwise idle an x64 agent on every merge.
  - template: sql-host-template.yml
    parameters:
      instanceId: build_arm
      expectedSentinels: build_arm
      sqlImageTag: ${{ parameters.sqlImageTag }}
      jobCondition: eq(variables['Build.Reason'], 'PullRequest')
  - job: Build_Windows
    displayName: Build Windows
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-Win22-Sql25-1P
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: sql-setup-template.yml
        parameters:
          buildTarget: Windows
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Windows
      - template: install-dependencies.yml
        parameters:
          osType: Windows
      - template: build-template.yml
        parameters:
          osType: Windows
          buildType: ${{ parameters.buildType }}
          testFilter: -E "not (test(connectivity))"
      # Extended Protection (EPA) channel-binding test.
      # Runs AFTER the main test pass. Runs the same integrated-auth encrypted
      # login test under two server configurations, expecting success in both:
      #   1. EPA = Off      -- baseline (channel binding not enforced).
      #   2. EPA = Required -- the server rejects any login lacking a valid
      #      channel binding, so a successful login proves we send a real,
      #      server-validated tls-unique token.
      # Reverts EPA to Off in `finally` so a failure still restores the
      # instance. Each registry change requires a SQL service restart, handled
      # by the script.
      - pwsh: |
          $ErrorActionPreference = 'Stop'
          $spns = @("MSSQLSvc/localhost:1433", "MSSQLSvc/$($env:COMPUTERNAME):1433")
          $configured = $false
          try {
            foreach ($level in @('Off', 'Required')) {
              ./.pipeline/scripts/Configure-ExtendedProtection.ps1 `
                -InstanceName 'MSSQLSERVER' -Level $level -ForceEncryption 'Yes' `
                -AcceptedNtlmSpns $spns -RestartService $true
              $configured = $true

              Write-Host "Running EPA channel-binding test with Extended Protection = $level"
              cargo nextest run --frozen --package mssql-tds `
                -E 'test(epa_channel_binding)' --no-fail-fast --profile ci
              if ($LASTEXITCODE -ne 0) { throw "EPA channel-binding test failed with EPA=$level (exit $LASTEXITCODE)" }
            }
          }
          finally {
            if ($configured) {
              Write-Host 'Reverting Extended Protection to Off...'
              ./.pipeline/scripts/Configure-ExtendedProtection.ps1 `
                -InstanceName 'MSSQLSERVER' -Level 'Off' -ForceEncryption 'No' -RestartService $true
            }
          }
        displayName: 'Extended Protection (EPA) channel-binding test'
        condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
        env:
          EPA_TEST: '1'
          SSPI_TEST: '1'
          SQL_PASSWORD: $(SQL_PASSWORD)
          RUST_BACKTRACE: full
      - task: PublishTestResults@2
        condition: and(succeededOrFailed(), eq(variables['Build.Reason'], 'PullRequest'))
        displayName: 'Publish EPA test results'
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: $(Build.SourcesDirectory)/target/nextest/ci/junit.xml
          testRunTitle: 'Extended Protection (EPA)'
      - template: build-python-wheels-template.yml
        parameters:
          osType: Windows
          architecture: x64

  - job: Build_Windows_Arm
    displayName: Build Windows ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-WINSRV-ARM
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      # Add Node.js to PATH for Azure DevOps tasks
      # Using x64 Node.js via Windows ARM64 emulation since ARM64 Node isn't available
      - pwsh: ./scripts/setup-nodejs-path.ps1
        displayName: 'Add Node.js to PATH for ADO tasks'

      # Create Node.js in the agent's externals folder where ADO tasks expect it
      - pwsh: ./scripts/install-nodejs-to-agent.ps1
        displayName: 'Install Node.js to agent externals folder'

      - template: cargo-authenticate-template.yml
        parameters:
          osType: Windows

      - template: install-dependencies.yml
        parameters:
          osType: Windows
          enableJsDeps: false
      - template: build-python-wheels-template.yml
        parameters:
          osType: Windows
          architecture: arm64
          # Python 3.10 excluded - limited ARM64 support
          pythonVersions:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'

  - job: Build_Linux
    displayName: Build Linux
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: build-template-container.yml
        parameters:
          architecture: x64
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableJsBuild: true
          enableJsTest: true
          additionalPythonTestArgs: '--coverage'
          collectPythonCoverage: true
          collectRustCoverage: true
      - template: build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
      - template: build-python-wheels-template.yml
        parameters:
          osType: Linux
          architecture: x64
      - template: build-python-wheels-template.yml
        parameters:
          osType: Alpine
          architecture: x64
      # Runs unconditionally on every Linux build (PR and non-PR).
      - task: ComponentGovernanceComponentDetection@0
        displayName: Component Governance detection
        condition: always()
        inputs:
          scanType: Register
          verbosity: Verbose
          sourceScanPath: '$(Build.SourcesDirectory)'

  - job: Build_Linux_ARM
    displayName: Build Linux ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-UBUNTU-ARM64
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - script: |
          .pipeline/scripts/print-disk-info.sh
        displayName: 'Print debug information about agent'

      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: build-template-container.yml
        parameters:
          architecture: ARM64
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          additionalPythonTestArgs: '--skip-integration'
      - template: build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
      - template: build-python-wheels-template.yml
        parameters:
          osType: Linux
          architecture: ARM64
      - template: build-python-wheels-template.yml
        parameters:
          osType: Alpine
          architecture: ARM64
  - job: Build_MacOS
    displayName: Build MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: MacOS
      - template: install-dependencies.yml
        parameters:
          osType: MacOS 
      - template: build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableJsBuild: true
          enableTests: false
      - template: build-python-wheels-template.yml
        parameters:
          osType: MacOS
          architecture: x64

  - job: Test_MacOS
    displayName: Test MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
      TRUST_SERVER_CERTIFICATE: 'true'
    steps:
      - template: sql-setup-template.yml
        parameters:
          buildTarget: MacOS
      - template: cargo-authenticate-template.yml
        parameters:
          osType: MacOS
      - template: install-dependencies.yml
        parameters:
          osType: MacOS
      - template: build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableRustBuild: false
          enableClippy: false

# Kerberos tests for PRs (fast - 2 distros: ubuntu22 + alpine318)
- stage: Kerberos_Test_PR
  displayName: Kerberos Test (PR)
  dependsOn:
    - EvaluateDuplicate
  condition: and(not(canceled()), eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'), ne(dependencies.EvaluateDuplicate.outputs['Evaluate.SetDuplicateState.skipDuplicate'], 'true'))
  jobs:
    - template: kerberos-test-template.yml
      parameters:
        profiles:
          - ubuntu22
          - alpine318
        testTimeout: 45
        useArchive: false  # PR builds compile from source to validate the PR code

# Kerberos tests for merge (full matrix across all distros)
- stage: Kerberos_Test_Full
  displayName: Kerberos Test (Full Matrix)
  dependsOn:
    - Build
  # Scope success to the Build stage explicitly. Bare succeeded() evaluates the
  # whole dependency graph, so the PR-only EvaluateDuplicate stage (skipped on
  # non-PR CI runs) would otherwise make this stage skip in CI.
  condition: and(succeeded('Build'), ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  jobs:
    - template: kerberos-test-template.yml
      parameters:
        profiles:
          - ubuntu22
          - ubuntu24
          - alpine318
          - alpine319
          - alpine320
          - alpine321
          - debian
          - rhel9
          - oracle9
        testTimeout: 120
        # useArchive: true (default) - uses pre-built nextest archives for faster testing

- stage: Fuzz
  displayName: Fuzz Testing Stage
  dependsOn: []
  condition: eq('${{ parameters.RunFuzz }}', 'true')
  jobs:
  - job: Fuzz_TokenStream_Linux
    displayName: Fuzz Test Token Stream Linux (30 min)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_token_stream

  - job: Fuzz_TdsClient_Linux
    displayName: Fuzz Test TdsClient Linux (30 min)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_tds_client

  - job: Fuzz_Additional_Targets_Linux
    displayName: Fuzz Additional Targets Linux (Serial - 5 min each)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_api_inputs
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_parameter_encoding
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_network
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_context
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_bulk_copy

- stage: Build_mssql_python
  dependsOn:
    - EvaluateDuplicate
  condition: and(not(canceled()), eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'), ne(dependencies.EvaluateDuplicate.outputs['Evaluate.SetDuplicateState.skipDuplicate'], 'true'))
  displayName: Build mssql-python
  jobs:
  - job: Build_mssql_python_Linux
    displayName: Build mssql-python (cross-repo)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: test-mssql-python-template.yml

  - job: Build_mssql_python_MacOS
    displayName: Build mssql-python macOS (cross-repo)
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: test-mssql-python-macos-template.yml

- stage: Test_alpine
  dependsOn: 
    - Build
  condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  displayName: Test Alpine
  jobs:
    - template: test-matrix-template-alpine.yml
      parameters:
        artifactName: 'Build_Linux'
        matrix:
          Alpine3_18:
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.18
            entry: alpine.sh
          Alpine3_19:
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.19
            entry: alpine.sh
          Alpine3_20:
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.20
            entry: alpine.sh
          Alpine3_21:
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.21
            entry: alpine.sh

- stage: Test_alpine_arm64
  dependsOn: 
    - Build
  condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  displayName: Test Alpine arm64
