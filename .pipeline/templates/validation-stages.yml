- ${{ if eq(parameters.includeInfraStages, true) }}:
  # Long-haul BCP test stage (30 minutes)
  - stage: LongHaul
    displayName: Long-Haul BCP Test (30 min)
    dependsOn: []
    condition: eq('${{ parameters.RunLongHaul }}', 'true')
    jobs:
    - job: LongHaul_BCP_Test
      displayName: Long-Haul BCP Test Ubuntu
      pool:
        name: RUST-1ES-POOL-WUS3
        demands:
          - imageOverride -equals RUST-1ES-UBUSLIM
      variables:
        CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      steps:
        - template: test-longhaul-template.yml
          parameters:
            durationSeconds: 1800  # 30 minutes
            batchSize: 1000

  # Private-link smoke test for mssql-py-core (non-PR only)
  # Deploys wheel into ACI on trusted VNet, runs pytest suite via managed identity
  - stage: PrivateLink_Smoke
    displayName: Private Link Smoke Test
    dependsOn:
      - Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
    jobs:
      - template: private-link-smoke-template.yml
