            entry: alpine.sh
          - name: Alpine3_20
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.20
            entry: alpine.sh
          - name: Alpine3_21
            container: ghcr.io/microsoft/mssql-rs/import/alpine:3.21
            entry: alpine.sh

