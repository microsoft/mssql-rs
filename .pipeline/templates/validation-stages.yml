# Shared validation stages consumed by validation-pipeline.yml (development CI/PR)
# and validation-pipeline-ci.yml (GitHub main CI). Single source of truth for stages.

parameters:
- name: buildType
  displayName: Type of the build to produce
  type: string
  values:
  - Both
  - Debug
  - Release
  default: Both

- name: RunFuzz
  displayName: Run Fuzz Tests (30 min)
  type: boolean
  default: false

- name: RunLongHaul
  displayName: Run Long-Haul BCP Test (30 min)
  type: boolean
  default: false

- name: includeInfraStages
  displayName: Include infra stages (Long-Haul, Private Link Smoke) that require the 'Magnitude Test' service connection
  type: boolean
  default: true

stages:
- stage: EvaluateDuplicate
  displayName: Evaluate PR duplicate
  condition: and(eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  jobs:
  - job: Evaluate
    displayName: Check prior successful PR validation
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    steps:
    - bash: |
        set -euo pipefail

        if [ -z "${SYSTEM_ACCESSTOKEN:-}" ]; then
          echo "##vso[task.logissue type=warning]System.AccessToken is unavailable; continuing with full validation."
          echo "##vso[task.setvariable variable=skipDuplicate;isOutput=true]false"
          exit 0
        fi

        python3 - <<'PY'
        import json
        import os
        import urllib.parse
        import urllib.request

        collection_uri = os.environ["SYSTEM_COLLECTIONURI"]
        team_project = os.environ["SYSTEM_TEAMPROJECT"]
        definition_id = os.environ["SYSTEM_DEFINITIONID"]
        current_build_id = int(os.environ["BUILD_BUILDID"])
        build_source_branch = os.environ.get("BUILD_SOURCEBRANCH", "")
        source_commit = os.environ.get("SYSTEM_PULLREQUEST_SOURCECOMMITID", "").lower()
        pull_request_id = os.environ.get("SYSTEM_PULLREQUEST_PULLREQUESTID", "")
        pull_request_number = os.environ.get("SYSTEM_PULLREQUEST_PULLREQUESTNUMBER", "")
        token = os.environ["SYSTEM_ACCESSTOKEN"]
        print(
            "Duplicate guard context: "
            f"buildId={current_build_id}, "
            f"branch={build_source_branch or '<empty>'}, "
            f"sourceCommit={source_commit or '<empty>'}, "
            f"pullRequestId={pull_request_id or '<empty>'}, "
            f"pullRequestNumber={pull_request_number or '<empty>'}"
        )
        current_pr_identifiers = {
            value for value in (pull_request_id, pull_request_number) if value
        }
        if not source_commit:
            print(
                "##vso[task.logissue type=warning]System.PullRequest.SourceCommitId is unavailable; continuing with full validation."
            )
            print("##vso[task.setvariable variable=skipDuplicate;isOutput=true]false")
            raise SystemExit(0)
        # 200 keeps API payloads small while covering repeated draft/ready transitions on busy PRs.
        # If a PR exceeds this window, the guard falls back to full validation (safe false negative).
        max_candidates = "200"

        query_params = {
            "definitions": definition_id,
            "reasonFilter": "pullRequest",
            "statusFilter": "completed",
            "resultFilter": "succeeded",
            "queryOrder": "finishTimeDescending",
            "$top": max_candidates,
            "api-version": "7.1",
        }
        if build_source_branch:
            # PR validation runs are indexed by the synthetic PR branch (for example refs/pull/<id>/merge),
            # not by System.PullRequest.SourceBranch (refs/heads/<branch>).
            query_params["branchName"] = build_source_branch
        query = urllib.parse.urlencode(query_params)
        url = f"{collection_uri}{team_project}/_apis/build/builds?{query}"
        headers = {"Authorization": "Bearer " + token}
        request = urllib.request.Request(url, headers=headers)
        try:
            with urllib.request.urlopen(request) as response:
                payload = json.load(response)
        except Exception as exc:
            print(
                f"##vso[task.logissue type=warning]Failed to query prior PR validation runs ({type(exc).__name__}: {exc}). Continuing with full validation."
            )
            print("##vso[task.setvariable variable=skipDuplicate;isOutput=true]false")
            raise SystemExit(0)

        matching_run = None
        candidates = payload.get("value", [])
        print(f"Duplicate guard candidates fetched: {len(candidates)}")
        skipped_for_pr_mismatch = 0
        skipped_for_missing_sha = 0
        for build in candidates:
            build_id = int(build.get("id", 0))
            if build_id == current_build_id:
                continue

            trigger_info = build.get("triggerInfo", {})
            # Field names vary across providers/API revisions; prefer provider-specific canonical keys first.
            # - pr.sourceSha: Azure Repos PR triggers
            # - pr.sourceCommitId: GitHub-backed PR triggers
            # - pr.headSha: alternate/legacy PR trigger payloads
            prior_source_sha = (
                trigger_info.get("pr.sourceSha")
                or trigger_info.get("pr.sourceCommitId")
                or trigger_info.get("pr.headSha")
            )
            if prior_source_sha:
                prior_source_sha = prior_source_sha.lower()
            if not prior_source_sha:
                skipped_for_missing_sha += 1
                continue
            prior_pr_identifiers = []
            for key in ("pr.number", "pr.pullRequestId"):
                value = trigger_info.get(key)
                if value is not None:
                    prior_pr_identifiers.append(str(value))
            # Without branch scope in the REST query, PR identifier mismatch is the only safe discriminator
            # to avoid treating runs from other PRs as duplicates.
            if (
                current_pr_identifiers
                and prior_pr_identifiers
                and set(prior_pr_identifiers).isdisjoint(current_pr_identifiers)
            ):
                if not build_source_branch:
                    skipped_for_pr_mismatch += 1
                    continue
                print(
                    f"Candidate run {build_id} has trigger PR identifiers {prior_pr_identifiers}, "
                    f"which do not overlap with current PR identifiers {sorted(current_pr_identifiers)}; "
                    "continuing with commit comparison because the API query is already branch-scoped."
                )

            if prior_source_sha == source_commit:
                matching_run = build
                break

        if matching_run:
            matching_run_id = matching_run.get("id", "unknown")
            print(
                f"PR head {source_commit} already validated by run {matching_run_id}; skipping duplicate stages."
            )
            print("##vso[task.setvariable variable=skipDuplicate;isOutput=true]true")
        else:
            print(
                "Duplicate guard summary: "
                f"skipped_for_pr_mismatch={skipped_for_pr_mismatch}, "
                f"skipped_for_missing_source_sha={skipped_for_missing_sha}"
            )
            print(f"No successful prior validation run found for PR head {source_commit}; continuing.")
            print("##vso[task.setvariable variable=skipDuplicate;isOutput=true]false")
        PY
      name: SetDuplicateState
      displayName: Check duplicate PR head commit
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- stage: Build
  displayName: Build Stage
  dependsOn:
    - EvaluateDuplicate
  condition: >-
    and(
      not(canceled()),
      eq('${{ parameters.RunFuzz }}', 'false'),
      eq('${{ parameters.RunLongHaul }}', 'false'),
      or(
        ne(variables['Build.Reason'], 'PullRequest'),
        ne(stageDependencies.EvaluateDuplicate.Evaluate.outputs['SetDuplicateState.skipDuplicate'], 'true')
      )
    )
  jobs:
  - job: Build_Windows
    displayName: Build Windows
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-Win22-Sql25-1P
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: sql-setup-template.yml
        parameters:
          buildTarget: Windows
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Windows
      - template: install-dependencies.yml
        parameters:
          osType: Windows
      - template: build-template.yml
        parameters:
          osType: Windows
          buildType: ${{ parameters.buildType }}
          testFilter: -E "not (test(connectivity))"
      - template: build-python-wheels-template.yml
        parameters:
          osType: Windows
          architecture: x64

  - job: Build_Windows_Arm
    displayName: Build Windows ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-WINSRV-ARM
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: C:\cargo_target_dir
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      # Add Node.js to PATH for Azure DevOps tasks
      # Using x64 Node.js via Windows ARM64 emulation since ARM64 Node isn't available
      - pwsh: ./scripts/setup-nodejs-path.ps1
        displayName: 'Add Node.js to PATH for ADO tasks'

      # Create Node.js in the agent's externals folder where ADO tasks expect it
      - pwsh: ./scripts/install-nodejs-to-agent.ps1
        displayName: 'Install Node.js to agent externals folder'

      - template: cargo-authenticate-template.yml
        parameters:
          osType: Windows

      - template: install-dependencies.yml
        parameters:
          osType: Windows
          enableJsDeps: false
      - template: build-python-wheels-template.yml
        parameters:
          osType: Windows
          architecture: arm64
          # Python 3.10 excluded - limited ARM64 support
          pythonVersions:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'

  - job: Build_Linux
    displayName: Build Linux
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: build-template-container.yml
        parameters:
          architecture: x64
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableJsBuild: true
          enableJsTest: true
      - template: build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
      - template: build-python-wheels-template.yml
        parameters:
          osType: Linux
          architecture: x64
      - template: build-python-wheels-template.yml
        parameters:
          osType: Alpine
          architecture: x64

  - job: Build_Linux_ARM
    displayName: Build Linux ARM
    pool:
      name: RUST-1ES-POOL-ARM-WUS3
      demands:
        - imageOverride -equals RUST-UBUNTU-ARM64
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - script: |
          .pipeline/scripts/print-disk-info.sh
        displayName: 'Print debug information about agent'

      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: build-template-container.yml
        parameters:
          architecture: ARM64
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(query_processing_driver) | test(query_result) | test(connectivity) | test(transaction) | test(rpc_results) | test(timeout_and_cancel) | test(rpc_datatypes) | test(client_based_iterators) | test(connect_fetch_multiple_packets) | test(iter_rows) | test(bulk_copy) | test(transport_protocols) | test(vector_integration_tests) | test(no_protocol_resolution) | test(multi_subnet_failover) | test(encryption_tests) | binary(test_tls_handshake) | binary(test_tvp) | binary(test_cursor_ops) | binary(test_reset_connection) | binary(test_connection_pool_primitives))'
          additionalPythonTestArgs: '--skip-integration'
      - template: build-template-alpine.yml
        parameters:
          osType: Linux
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
      - template: build-python-wheels-template.yml
        parameters:
          osType: Linux
          architecture: ARM64
      - template: build-python-wheels-template.yml
        parameters:
          osType: Alpine
          architecture: ARM64
  - job: Build_MacOS
    displayName: Build MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      # For details on this CARGO_TARGET_DIR setting, see https://eng.ms/docs/more/rust/topics/onebranch-workaround
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: MacOS
      - template: install-dependencies.yml
        parameters:
          osType: MacOS 
      - template: build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableJsBuild: true
          enableTests: false
      - template: build-python-wheels-template.yml
        parameters:
          osType: MacOS
          architecture: x64

  - job: Test_MacOS
    displayName: Test MacOS
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)'
      TRUST_SERVER_CERTIFICATE: 'true'
    steps:
      - template: sql-setup-template.yml
        parameters:
          buildTarget: MacOS
      - template: cargo-authenticate-template.yml
        parameters:
          osType: MacOS
      - template: install-dependencies.yml
        parameters:
          osType: MacOS
      - template: build-template.yml
        parameters:
          osType: MacOS
          buildType: ${{ parameters.buildType }}
          testFilter: -E 'not (test(connectivity))'
          enableRustBuild: false
          enableClippy: false

# Kerberos tests for PRs (fast - 2 distros: ubuntu22 + alpine318)
- stage: Kerberos_Test_PR
  displayName: Kerberos Test (PR)
  dependsOn:
    - EvaluateDuplicate
  condition: and(not(canceled()), eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'), ne(stageDependencies.EvaluateDuplicate.Evaluate.outputs['SetDuplicateState.skipDuplicate'], 'true'))
  jobs:
    - template: kerberos-test-template.yml
      parameters:
        profiles:
          - ubuntu22
          - alpine318
        testTimeout: 45
        useArchive: false  # PR builds compile from source to validate the PR code

# Kerberos tests for merge (full matrix across all distros)
- stage: Kerberos_Test_Full
  displayName: Kerberos Test (Full Matrix)
  dependsOn:
    - Build
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
  jobs:
    - template: kerberos-test-template.yml
      parameters:
        profiles:
          - ubuntu22
          - ubuntu24
          - alpine318
          - alpine319
          - alpine320
          - alpine321
          - debian
          - rhel9
          - oracle9
        testTimeout: 120
        # useArchive: true (default) - uses pre-built nextest archives for faster testing

- stage: Fuzz
  displayName: Fuzz Testing Stage
  dependsOn: []
  condition: eq('${{ parameters.RunFuzz }}', 'true')
  jobs:
  - job: Fuzz_TokenStream_Linux
    displayName: Fuzz Test Token Stream Linux (30 min)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_token_stream

  - job: Fuzz_TdsClient_Linux
    displayName: Fuzz Test TdsClient Linux (30 min)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 1800
          fuzzTarget: fuzz_tds_client

  - job: Fuzz_Additional_Targets_Linux
    displayName: Fuzz Additional Targets Linux (Serial - 5 min each)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: cargo-authenticate-template.yml
        parameters:
          osType: Linux
      - template: install-dependencies.yml
        parameters:
          osType: Linux
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_api_inputs
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_parameter_encoding
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_network
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_connection_provider_context
      - template: fuzz-template.yml
        parameters:
          osType: Linux
          fuzzDurationSeconds: 300
          fuzzTarget: fuzz_bulk_copy

- stage: Build_mssql_python
  dependsOn:
    - EvaluateDuplicate
  condition: and(not(canceled()), eq(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'), ne(stageDependencies.EvaluateDuplicate.Evaluate.outputs['SetDuplicateState.skipDuplicate'], 'true'))
  displayName: Build mssql-python
  jobs:
  - job: Build_mssql_python_Linux
    displayName: Build mssql-python (cross-repo)
    pool:
      name: RUST-1ES-POOL-WUS3
      demands:
        - imageOverride -equals RUST-1ES-UBUSLIM
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: test-mssql-python-template.yml

  - job: Build_mssql_python_MacOS
    displayName: Build mssql-python macOS (cross-repo)
    pool:
      name: Azure Pipelines
      vmImage: macOS-latest
    variables:
      CARGO_TARGET_DIR: $(Build.SourcesDirectory)
    steps:
      - template: test-mssql-python-macos-template.yml

- stage: Test_alpine
  dependsOn: 
    - Build
  condition: and(ne(variables['Build.Reason'], 'PullRequest'), eq('${{ parameters.RunFuzz }}', 'false'), eq('${{ parameters.RunLongHaul }}', 'false'))
